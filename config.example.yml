# ChatBot SNS 
# config.yml 

# --- LLM Settings ---
llm:
  provider: "openai"
  api_key: ""
  base_url: "https://api.openai.com/v1"
  model: "gpt-4o"
  temperature: 0.7
  max_tokens: 8192

# --- Personality Settings ---
personality:
  card_dir: "bot/personality/cards"
  default_card: "default"

# --- Memory Settings ---
memory:
  short_term_size: 100

# --- Adapter Settings ---
adapter:
  adapter: "terminal"

debug: false
